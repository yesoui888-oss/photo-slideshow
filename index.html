<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>巡 - Slideshow</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;background:#0c0c0d;color:#f4f1ea;font-family:-apple-system,sans-serif;}

  #intro{
    min-height:100svh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:24px;
    padding:40px 32px;text-align:center;
  }
  #intro.hidden{display:none;}
  h1{font-size:clamp(26px,7vw,38px);font-weight:300;line-height:1.4;}
  h1 b{font-weight:600;color:#c2542e;}
  .sub{font-size:13px;color:rgba(244,241,234,0.5);max-width:280px;line-height:1.7;}

  /* inputをそのまま見せる — 隠さない */
  #fileInput{
    display:block;
    padding:14px 32px;
    font-size:16px;
    color:#f4f1ea;
    background:transparent;
    border:1px solid #c2542e;
    border-radius:2px;
    cursor:pointer;
    width:260px;
    text-align:center;
  }
  /* iOS Safariでのファイル入力ボタンのテキストをスタイル */
  #fileInput::-webkit-file-upload-button{
    background:#c2542e;color:#fff;border:none;
    padding:10px 20px;font-size:14px;cursor:pointer;border-radius:2px;
    margin-right:10px;
  }

  #dbg{
    font-size:12px;color:#0f0;background:rgba(0,0,0,0.6);
    padding:8px 16px;border-radius:4px;min-height:1.5em;
    max-width:320px;word-break:break-all;line-height:1.5;
  }

  /* スライドショー */
  #stage{position:fixed;inset:0;background:#000;z-index:10;display:none;}
  #stage.show{display:block;}
  #stage img{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:contain;background:#000;
    opacity:0;transition:opacity 0.4s;
  }
  #stage img.active{opacity:1;}
  #ctrl{
    position:fixed;bottom:40px;left:0;right:0;z-index:20;
    display:flex;justify-content:center;gap:12px;
  }
  .cbtn{
    background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.3);
    color:#fff;width:48px;height:48px;border-radius:50%;
    font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  #counter{
    position:fixed;top:max(16px,env(safe-area-inset-top));left:0;right:0;
    z-index:20;text-align:center;font-size:13px;color:rgba(255,255,255,0.7);
  }
</style>
</head>
<body>

<div id="intro">
  <h1>写真は、<br><b>一秒</b>ごとに巡る。</h1>
  <p class="sub">写真を選ぶと1秒ごとに切り替わります</p>

  <!-- inputを直接表示 (隠さない・透明にしない) -->
  <input type="file" id="fileInput" accept="image/*" multiple>

  <div id="dbg">ここにデバッグ情報が表示されます</div>
</div>

<div id="stage">
  <div id="counter">- / -</div>
  <div id="ctrl">
    <div class="cbtn" id="prevBtn">‹</div>
    <div class="cbtn" id="ppBtn">❚❚</div>
    <div class="cbtn" id="nextBtn">›</div>
    <div class="cbtn" id="closeBtn">✕</div>
  </div>
</div>

<script>
(function(){
  const intro   = document.getElementById('intro');
  const fileInput=document.getElementById('fileInput');
  const dbg     = document.getElementById('dbg');
  const stage   = document.getElementById('stage');
  const counter = document.getElementById('counter');
  const ppBtn   = document.getElementById('ppBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const closeBtn= document.getElementById('closeBtn');

  let files=[], imgA, imgB, current=0, playing=false, timer=null;

  function log(msg){ dbg.textContent = msg; console.log(msg); }

  log('JS読み込み完了');

  fileInput.addEventListener('change', async e=>{
    log('changeイベント発火');
    const all = Array.from(e.target.files||[]);
    log(`ファイル数: ${all.length}`);
    if (!all.length){ log('ファイルなし'); return; }

    files = all;
    log(`1枚目: ${files[0].name} / ${files[0].type} / ${files[0].size}bytes`);

    let url;
    try {
      url = URL.createObjectURL(files[0]);
      log(`URL: ${url.slice(0,50)}`);
    } catch(err){
      log(`ObjectURL失敗: ${err.message}`);
      // FileReaderで試みる
      url = await new Promise(res=>{
        const r=new FileReader();
        r.onload=ev=>res(ev.target.result);
        r.onerror=()=>res(null);
        r.readAsDataURL(files[0]);
      });
      log(`FileReader: ${url ? url.slice(0,30)+'…' : 'null'}`);
    }
    if (!url){ log('URL取得失敗'); return; }

    startShow(url);
  });

  function startShow(firstUrl){
    log('startShow呼び出し');
    intro.classList.add('hidden');
    stage.querySelectorAll('img').forEach(n=>n.remove());
    imgA = new Image(); imgB = new Image();
    imgA.className='slide'; imgB.className='slide';
    stage.prepend(imgB); stage.prepend(imgA);
    imgA.onload=()=>log('1枚目表示OK');
    imgA.onerror=()=>log('1枚目表示エラー');
    imgA.src=firstUrl;
    imgA.classList.add('active');
    stage.classList.add('show');
    current=0;
    counter.textContent=`1 / ${files.length}`;
    startPlay();
  }

  async function showSlide(idx){
    const i=(idx+files.length)%files.length;
    let url;
    try { url=URL.createObjectURL(files[i]); }
    catch(e){ return; }
    const on =imgA.classList.contains('active')?imgA:imgB;
    const off=on===imgA?imgB:imgA;
    off.src=url;
    await new Promise(r=>{off.onload=r;off.onerror=r;});
    off.classList.add('active'); on.classList.remove('active');
    setTimeout(()=>{ on.src=''; },500);
    current=i; counter.textContent=`${i+1} / ${files.length}`;
  }

  function startPlay(){
    if(playing||files.length<2)return;
    playing=true; ppBtn.textContent='❚❚';
    timer=setInterval(()=>showSlide(current+1),1000);
  }
  function stopPlay(){
    playing=false; ppBtn.textContent='▶'; clearInterval(timer);
  }
  ppBtn.addEventListener('click',   ()=>playing?stopPlay():startPlay());
  prevBtn.addEventListener('click', ()=>{stopPlay();showSlide(current-1);});
  nextBtn.addEventListener('click', ()=>{stopPlay();showSlide(current+1);});
  closeBtn.addEventListener('click',()=>{
    stopPlay(); stage.classList.remove('show');
    intro.classList.remove('hidden');
    fileInput.value=''; files=[]; current=0;
    log('リセット完了');
  });
})();
</script>
</body>
</html>
