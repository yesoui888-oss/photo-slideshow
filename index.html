<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>巡 - Slideshow</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:#000;color:#fff;font-family:sans-serif;}

  #intro{
    height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:20px;
    padding:32px;text-align:center;background:#111;
  }
  #intro.hidden{display:none;}

  h1{font-size:24px;font-weight:300;}
  h1 b{color:#c2542e;}

  /* 画面全体を覆う透明input */
  #fileInput{
    position:fixed;top:0;left:0;width:100%;height:100%;
    opacity:0;z-index:99;cursor:pointer;font-size:16px;
  }
  #fileInput.hidden{display:none;}

  .btn-look{
    border:1px solid #c2542e;padding:14px 40px;
    font-size:15px;border-radius:2px;color:#fff;background:transparent;
  }
  #dbg{
    position:fixed;top:0;left:0;right:0;z-index:999;
    background:rgba(0,0,0,0.85);color:#0f0;
    font-size:11px;padding:8px 12px;line-height:1.6;
    white-space:pre-wrap;pointer-events:none;
  }

  /* スライドショー */
  #stage{position:fixed;inset:0;background:#000;z-index:10;display:none;}
  #stage.show{display:block;}
  #stage img{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:contain;background:#000;
    opacity:0;transition:opacity 0.4s;
  }
  #stage img.active{opacity:1;}
  #ctrl{
    position:fixed;bottom:30px;left:0;right:0;z-index:20;
    display:flex;justify-content:center;gap:16px;
  }
  .cbtn{
    background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.3);
    color:#fff;width:48px;height:48px;border-radius:50%;
    font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  #counter{
    position:fixed;top:max(16px,env(safe-area-inset-top));left:16px;
    z-index:20;font-size:13px;color:rgba(255,255,255,0.7);
  }
</style>
</head>
<body>

<div id="dbg">起動しました</div>

<div id="intro">
  <h1>写真は、<br><b>一秒</b>ごとに巡る。</h1>
  <p style="font-size:13px;color:rgba(255,255,255,0.5)">画面をタップして写真を選ぶ</p>
  <div class="btn-look">写真を選ぶ</div>
  <p id="introStatus" style="font-size:12px;color:rgba(255,255,255,0.4);min-height:1em;"></p>
</div>

<input type="file" id="fileInput" accept="image/*" multiple>

<div id="stage">
  <div id="counter">- / -</div>
  <div id="ctrl">
    <div class="cbtn" id="prevBtn">‹</div>
    <div class="cbtn" id="ppBtn">❚❚</div>
    <div class="cbtn" id="nextBtn">›</div>
    <div class="cbtn" id="closeBtn">✕</div>
  </div>
</div>

<script>
(function(){
  const dbg     = document.getElementById('dbg');
  const intro   = document.getElementById('intro');
  const iStatus = document.getElementById('introStatus');
  const fileInput=document.getElementById('fileInput');
  const stage   = document.getElementById('stage');
  const counter = document.getElementById('counter');
  const ppBtn   = document.getElementById('ppBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const closeBtn= document.getElementById('closeBtn');

  let files=[], imgA, imgB, current=0, playing=false, timer=null;

  function log(msg){
    dbg.textContent = msg;
    console.log(msg);
  }

  fileInput.addEventListener('change', async e=>{
    files = Array.from(e.target.files||[]);
    log(`選択: ${files.length}枚 / type[0]=${files[0]?.type} / name[0]=${files[0]?.name}`);
    iStatus.textContent = `${files.length}枚選択中…`;
    if (!files.length) return;

    fileInput.classList.add('hidden');

    // ObjectURLを試す
    let url;
    try {
      url = URL.createObjectURL(files[0]);
      log(`URL作成OK: ${url.slice(0,40)}`);
    } catch(err){
      log(`URL作成NG: ${err}`);
      iStatus.textContent = 'エラー: '+err;
      return;
    }

    // imgで読み込めるか確認
    await new Promise(res=>{
      const test = new Image();
      test.onload = ()=>{ log(`img読込OK: ${test.naturalWidth}x${test.naturalHeight}`); res(); };
      test.onerror = (e)=>{ log(`img読込NG: ${JSON.stringify(e.type)}`); res(); };
      test.src = url;
    });

    startShow(url);
  });

  function startShow(firstUrl){
    intro.classList.add('hidden');
    stage.querySelectorAll('img').forEach(n=>n.remove());
    imgA = document.createElement('img');
    imgB = document.createElement('img');
    stage.insertBefore(imgA, document.getElementById('counter'));
    stage.insertBefore(imgB, document.getElementById('counter'));
    imgA.src = firstUrl;
    imgA.classList.add('active');
    imgA.onload = ()=>log(`imgA表示OK`);
    imgA.onerror= ()=>log(`imgA表示NG`);
    stage.classList.add('show');
    current = 0;
    counter.textContent = `1 / ${files.length}`;
    log(`スライドショー開始: ${files.length}枚`);
    startPlay();
  }

  async function showSlide(idx){
    const i = (idx+files.length)%files.length;
    let url;
    try { url = URL.createObjectURL(files[i]); }
    catch(e){ log('URL error:'+e); return; }

    const showing = imgA.classList.contains('active') ? imgA : imgB;
    const hidden  = showing===imgA ? imgB : imgA;
    hidden.src = url;
    await new Promise(r=>{hidden.onload=r; hidden.onerror=r;});
    hidden.classList.add('active');
    showing.classList.remove('active');
    setTimeout(()=>{ showing.src=''; }, 500);
    current = i;
    counter.textContent = `${i+1} / ${files.length}`;
  }

  function startPlay(){
    if (playing||files.length<2) return;
    playing=true; ppBtn.textContent='❚❚';
    timer=setInterval(()=>showSlide(current+1), 1000);
  }
  function stopPlay(){
    playing=false; ppBtn.textContent='▶';
    clearInterval(timer);
  }

  ppBtn.addEventListener('click',   ()=>playing?stopPlay():startPlay());
  prevBtn.addEventListener('click', ()=>{ stopPlay(); showSlide(current-1); });
  nextBtn.addEventListener('click', ()=>{ stopPlay(); showSlide(current+1); });
  closeBtn.addEventListener('click',()=>{
    stopPlay();
    stage.classList.remove('show');
    intro.classList.remove('hidden');
    fileInput.classList.remove('hidden');
    fileInput.value='';
    files=[]; current=0;
    log('トップに戻りました');
  });
})();
</script>
</body>
</html>
